name: Build and Publish Django-Lokdown Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "lokdown/**"
      - "pyproject.toml"
      - "README.md"

concurrency:
  group: pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-package:
    name: Build lokdown package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tool
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify package artifacts
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          if [[ ${#wheels[@]} -ne 1 || ${#sdists[@]} -ne 1 ]]; then
            echo "Expected exactly one wheel and one sdist in dist/"
            ls -la dist/ || true
            exit 1
          fi
          wheel="${wheels[0]}"
          sdist="${sdists[0]}"
          case "$(basename "$wheel")" in
            django_lokdown-*) ;;
            *)
              echo "Unexpected wheel name: $wheel"
              exit 1
              ;;
          esac
          case "$(basename "$sdist")" in
            django_lokdown-*) ;;
            *)
              echo "Unexpected sdist name: $sdist"
              exit 1
              ;;
          esac
          python -m zipfile -l "$wheel" | grep -q "lokdown/"
          if python -m zipfile -l "$wheel" | grep -q "example/"; then
            echo "Wheel must not include example project files"
            exit 1
          fi
          tar -tzf "$sdist" | grep -q "lokdown/"
          if tar -tzf "$sdist" | grep -q "example/"; then
            echo "Sdist must not include example project files"
            exit 1
          fi

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: django-lokdown-dist
          path: dist/*
          if-no-files-found: error

  publish-package:
    name: Publish to PyPI
    needs: build-package
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: django-lokdown-dist
          path: dist

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install twine
        run: python -m pip install --upgrade pip twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: python -m twine upload --non-interactive dist/*
